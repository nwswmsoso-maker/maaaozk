<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو التسجيل الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0a 50%, #1a1a2e 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(90deg, #00ffff, #0099ff, #9933ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .header p {
            color: #888;
            font-size: 0.9rem;
        }

        /* Visualizer Container */
        .visualizer-container {
            background: #000;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #333;
            transition: all 0.3s ease;
        }

        .visualizer-container.recording {
            border-color: #00ffff;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.3),
                0 0 40px rgba(0, 255, 255, 0.2),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 
                    0 0 20px rgba(0, 255, 255, 0.3),
                    0 0 40px rgba(0, 255, 255, 0.2),
                    inset 0 0 20px rgba(0, 255, 255, 0.1);
            }
            50% { 
                box-shadow: 
                    0 0 30px rgba(0, 255, 255, 0.5),
                    0 0 60px rgba(0, 255, 255, 0.3),
                    inset 0 0 30px rgba(0, 255, 255, 0.2);
            }
        }

        #visualizer {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            display: block;
        }

        /* VU Meter */
        .vu-meter-container {
            margin-top: 20px;
        }

        .vu-meter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .vu-meter-label {
            color: #888;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .vu-meter-value {
            color: #00ffff;
            font-weight: bold;
        }

        .vu-meter {
            background: linear-gradient(to right, 
                #00ff00 0%, #00ff00 50%, 
                #ffff00 50%, #ffff00 75%, 
                #ff0000 75%, #ff0000 100%);
            height: 8px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .vu-meter-mask {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.8);
            transition: transform 0.1s ease-out;
        }

        /* Timer */
        .timer {
            text-align: center;
            margin-top: 20px;
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            color: #00ffff;
            letter-spacing: 0.2em;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .timer-status {
            color: #ffcc00;
            margin-top: 10px;
            font-size: 0.9rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Controls */
        .controls {
            background: linear-gradient(135deg, #2a2a3a 0%, #1a1a2a 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .controls-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        #startBtn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        #startBtn:hover {
            background: linear-gradient(135deg, #ff5555, #dd0000);
            box-shadow: 0 6px 20px rgba(255, 68, 68, 0.5);
            transform: scale(1.05);
        }

        #pauseBtn {
            background: linear-gradient(135deg, #ffaa00, #ff8800);
            color: white;
        }

        #pauseBtn:hover {
            background: linear-gradient(135deg, #ffbb00, #ff9900);
            box-shadow: 0 6px 20px rgba(255, 170, 0, 0.5);
            transform: scale(1.05);
        }

        #stopBtn {
            background: linear-gradient(135deg, #0088ff, #0066cc);
            color: white;
        }

        #stopBtn:hover {
            background: linear-gradient(135deg, #0099ff, #0077dd);
            box-shadow: 0 6px 20px rgba(0, 136, 255, 0.5);
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }

        /* Recordings */
        .recordings {
            background: #1a1a2a;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #333;
        }

        .recordings-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .recordings-header h2 {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .recordings-indicator {
            width: 6px;
            height: 40px;
            background: linear-gradient(to bottom, #00ffff, #0066ff);
            border-radius: 3px;
        }

        .recording-item {
            background: #0a0a1a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #333;
            transition: all 0.3s ease;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .recording-item:hover {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .recording-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .recording-info {
            flex: 1;
        }

        .recording-title {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .recording-timestamp {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .recording-duration {
            color: #aaa;
            font-size: 0.95rem;
        }

        .recording-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            padding: 12px;
            min-width: auto;
            border-radius: 10px;
        }

        .download-btn {
            background: linear-gradient(135deg, #00aa00, #008800);
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #00bb00, #009900);
            transform: scale(1.1);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
        }

        .delete-btn:hover {
            background: linear-gradient(135deg, #ff5555, #dd0000);
            transform: scale(1.1);
        }

        .quality-btn {
            padding: 12px 20px;
            font-size: 0.95rem;
            background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
            border: 2px solid #444;
            min-width: auto;
        }

        .quality-btn:hover {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .quality-btn.active {
            background: linear-gradient(135deg, #00aaaa, #008888);
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        audio {
            width: 100%;
            height: 40px;
            border-radius: 8px;
            filter: hue-rotate(180deg) saturate(1.5);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9rem;
        }

        /* SVG Icons */
        .icon {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .timer-display {
                font-size: 2.5rem;
            }

            button {
                padding: 12px 20px;
                font-size: 1rem;
            }

            .recordings-header h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>استوديو التسجيل</h1>
            <p>تسجيل احترافي بجودة عالية</p>
        </div>

        <!-- Visualizer -->
        <div class="visualizer-container" id="visualizerContainer">
            <canvas id="visualizer"></canvas>
            
            <!-- VU Meter -->
            <div class="vu-meter-container">
                <div class="vu-meter-header">
                    <div class="vu-meter-label">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                        مستوى الصوت
                    </div>
                    <div class="vu-meter-value" id="volumeValue">0%</div>
                </div>
                <div class="vu-meter">
                    <div class="vu-meter-mask" id="vuMeterMask"></div>
                </div>
            </div>

            <!-- Timer -->
            <div class="timer">
                <div class="timer-display" id="timerDisplay">00:00</div>
                <div class="timer-status hidden" id="pausedStatus">متوقف مؤقتاً</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <!-- Quality Selector -->
            <div style="margin-bottom: 20px; text-align: center;">
                <div style="color: #00ffff; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem;">
                    جودة التسجيل
                </div>
                <div style="display: flex; justify-content: center; gap: 10px;">
                    <button id="studioQuality" class="quality-btn active" onclick="setQuality('studio')">
                        <svg class="icon" style="width: 18px; height: 18px;" viewBox="0 0 24 24">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                        استوديو WAV
                        <span style="font-size: 0.75rem; opacity: 0.8; display: block;">غير مضغوط - أعلى جودة</span>
                    </button>
                    <button id="highQuality" class="quality-btn" onclick="setQuality('high')">
                        <svg class="icon" style="width: 18px; height: 18px;" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        عالي WebM
                        <span style="font-size: 0.75rem; opacity: 0.8; display: block;">مضغوط - ملف أصغر</span>
                    </button>
                </div>
            </div>

            <div class="controls-buttons">
                <button id="startBtn">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    ابدأ التسجيل
                </button>

                <button id="pauseBtn" class="hidden">
                    <svg class="icon" viewBox="0 0 24 24" id="pauseIcon">
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                    <svg class="icon hidden" viewBox="0 0 24 24" id="playIcon">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    <span id="pauseBtnText">إيقاف مؤقت</span>
                </button>

                <button id="stopBtn" class="hidden">
                    <svg class="icon" viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    </svg>
                    إيقاف وحفظ
                </button>
            </div>
        </div>

        <!-- Recordings -->
        <div class="recordings hidden" id="recordingsSection">
            <div class="recordings-header">
                <div class="recordings-indicator"></div>
                <h2>التسجيلات (<span id="recordingsCount">0</span>)</h2>
            </div>
            <div id="recordingsList"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>🎙️ جودة استوديو احترافية • 48kHz 24-bit • WAV غير مضغوط</p>
            <p style="margin-top: 5px; font-size: 0.8rem;">معالج صوتي ديناميكي • تحسين تلقائي للصوت</p>
        </div>
    </div>

    <script>
        // State
        let isRecording = false;
        let isPaused = false;
        let recordings = [];
        let currentTime = 0;
        let volumeLevel = 0;
        let recordingQuality = 'studio'; // 'studio' or 'high'

        // References
        let mediaRecorder = null;
        let audioContext = null;
        let analyser = null;
        let stream = null;
        let animationFrame = null;
        let timerInterval = null;
        let chunks = [];
        let audioWorkletNode = null;

        // DOM Elements
        const visualizer = document.getElementById('visualizer');
        const ctx = visualizer.getContext('2d');
        const visualizerContainer = document.getElementById('visualizerContainer');
        const timerDisplay = document.getElementById('timerDisplay');
        const pausedStatus = document.getElementById('pausedStatus');
        const volumeValue = document.getElementById('volumeValue');
        const vuMeterMask = document.getElementById('vuMeterMask');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const pauseIcon = document.getElementById('pauseIcon');
        const playIcon = document.getElementById('playIcon');
        const pauseBtnText = document.getElementById('pauseBtnText');
        const recordingsSection = document.getElementById('recordingsSection');
        const recordingsList = document.getElementById('recordingsList');
        const recordingsCount = document.getElementById('recordingsCount');

        // Set canvas size
        function resizeCanvas() {
            const rect = visualizer.getBoundingClientRect();
            visualizer.width = rect.width * 2;
            visualizer.height = rect.height * 2;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Initialize Audio
        async function initializeAudio() {
            try {
                // طلب صلاحيات الميكروفون بجودة عالية جداً
                stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,  // إيقاف لأنه يقلل الجودة
                        noiseSuppression: false,   // إيقاف لأنه يقلل الجودة
                        autoGainControl: false,    // إيقاف التحكم التلقائي
                        sampleRate: 48000,         // جودة استوديو
                        sampleSize: 24,            // عمق 24-bit
                        channelCount: 2,           // ستيريو
                        latency: 0                 // أقل تأخير
                    }
                });

                // إنشاء AudioContext بأعلى جودة
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 48000,
                    latencyHint: 'playback'
                });

                analyser = audioContext.createAnalyser();
                analyser.fftSize = 4096; // تحليل أدق

                const source = audioContext.createMediaStreamSource(stream);
                
                // إضافة معالجات صوتية للجودة
                const dynamicsCompressor = audioContext.createDynamicsCompressor();
                dynamicsCompressor.threshold.setValueAtTime(-24, audioContext.currentTime);
                dynamicsCompressor.knee.setValueAtTime(30, audioContext.currentTime);
                dynamicsCompressor.ratio.setValueAtTime(12, audioContext.currentTime);
                dynamicsCompressor.attack.setValueAtTime(0.003, audioContext.currentTime);
                dynamicsCompressor.release.setValueAtTime(0.25, audioContext.currentTime);

                // توصيل المعالجات
                source.connect(dynamicsCompressor);
                dynamicsCompressor.connect(analyser);

                // اختيار أفضل جودة تسجيل متوفرة
                let options;
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=pcm')) {
                    // PCM غير مضغوط - أفضل جودة
                    options = {
                        mimeType: 'audio/webm;codecs=pcm',
                        audioBitsPerSecond: 2116800 // ~2 Mbps
                    };
                } else if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                    // Opus بأعلى جودة
                    options = {
                        mimeType: 'audio/webm;codecs=opus',
                        audioBitsPerSecond: 510000 // 510 kbps - أعلى جودة
                    };
                } else {
                    // احتياطي
                    options = {
                        audioBitsPerSecond: 320000
                    };
                }

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        chunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const mimeType = options.mimeType || 'audio/webm';
                    const blob = new Blob(chunks, { type: mimeType });
                    
                    // تحويل إلى WAV للجودة القصوى (اختياري)
                    let finalBlob = blob;
                    let fileExt = 'webm';
                    
                    if (recordingQuality === 'studio') {
                        try {
                            finalBlob = await convertToWAV(blob);
                            fileExt = 'wav';
                        } catch (err) {
                            console.log('استخدام WebM بدلاً من WAV');
                        }
                    }
                    
                    const url = URL.createObjectURL(finalBlob);
                    const recording = {
                        id: Date.now(),
                        url: url,
                        duration: currentTime,
                        timestamp: new Date().toLocaleString('ar-SA'),
                        format: fileExt,
                        size: (finalBlob.size / 1024 / 1024).toFixed(2) + ' MB'
                    };
                    recordings.push(recording);
                    chunks = [];
                    currentTime = 0;
                    updateRecordingsList();
                };

                return true;
            } catch (err) {
                console.error('Error:', err);
                alert('الرجاء السماح بالوصول للميكروفون');
                return false;
            }
        }

        // تحويل إلى WAV (جودة غير مضغوطة)
        async function convertToWAV(blob) {
            const arrayBuffer = await blob.arrayBuffer();
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({
                sampleRate: 48000
            });
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            const wavBuffer = audioBufferToWav(audioBuffer);
            return new Blob([wavBuffer], { type: 'audio/wav' });
        }

        // تحويل AudioBuffer إلى WAV
        function audioBufferToWav(buffer) {
            const numOfChan = buffer.numberOfChannels;
            const length = buffer.length * numOfChan * 2;
            const bufferArray = new ArrayBuffer(44 + length);
            const view = new DataView(bufferArray);
            const channels = [];
            let offset = 0;
            let pos = 0;

            // كتابة WAV header
            setUint32(0x46464952); // "RIFF"
            setUint32(length + 36); // file length - 8
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt "
            setUint32(16); // length = 16
            setUint16(1); // PCM (uncompressed)
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
            setUint16(numOfChan * 2); // block-align
            setUint16(16); // 16-bit
            setUint32(0x61746164); // "data"
            setUint32(length);

            // كتابة البيانات الصوتية
            for (let i = 0; i < buffer.numberOfChannels; i++) {
                channels.push(buffer.getChannelData(i));
            }

            while (pos < buffer.length) {
                for (let i = 0; i < numOfChan; i++) {
                    let sample = Math.max(-1, Math.min(1, channels[i][pos]));
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(44 + offset, sample, true);
                    offset += 2;
                }
                pos++;
            }

            function setUint16(data) {
                view.setUint16(pos, data, true);
                pos += 2;
            }

            function setUint32(data) {
                view.setUint32(pos, data, true);
                pos += 4;
            }

            return bufferArray;
        }

        // Draw Visualizer
        function drawVisualizer() {
            if (!analyser) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                animationFrame = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                // Calculate volume
                const average = dataArray.reduce((a, b) => a + b) / bufferLength;
                volumeLevel = Math.min(100, (average / 255) * 100);
                volumeValue.textContent = Math.round(volumeLevel) + '%';
                vuMeterMask.style.transform = `translateX(-${100 - volumeLevel}%)`;

                // Clear canvas
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, visualizer.width, visualizer.height);

                // Draw frequency bars
                const barWidth = (visualizer.width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * visualizer.height * 0.8;
                    
                    const gradient = ctx.createLinearGradient(0, visualizer.height - barHeight, 0, visualizer.height);
                    gradient.addColorStop(0, `hsl(${180 + i * 0.5}, 100%, 60%)`);
                    gradient.addColorStop(1, `hsl(${280 + i * 0.5}, 100%, 50%)`);
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x, visualizer.height - barHeight, barWidth, barHeight);
                    
                    x += barWidth + 2;
                }

                // Draw waveform
                analyser.getByteTimeDomainData(dataArray);
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#00ffff';
                ctx.beginPath();

                const sliceWidth = visualizer.width / bufferLength;
                x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = (v * visualizer.height) / 2;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }

                    x += sliceWidth;
                }

                ctx.stroke();
            }

            draw();
        }

        // Start Recording
        async function startRecording() {
            const initialized = await initializeAudio();
            if (!initialized) return;

            chunks = [];
            currentTime = 0;
            isRecording = true;
            isPaused = false;

            visualizerContainer.classList.add('recording');
            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            stopBtn.classList.remove('hidden');

            mediaRecorder.start();
            drawVisualizer();

            timerInterval = setInterval(() => {
                currentTime++;
                updateTimer();
            }, 1000);
        }

        // Stop Recording
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }

            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }

            if (timerInterval) {
                clearInterval(timerInterval);
            }

            isRecording = false;
            isPaused = false;
            volumeLevel = 0;

            visualizerContainer.classList.remove('recording');
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            stopBtn.classList.add('hidden');
            pausedStatus.classList.add('hidden');

            volumeValue.textContent = '0%';
            vuMeterMask.style.transform = 'translateX(-100%)';
            timerDisplay.textContent = '00:00';
        }

        // Toggle Pause
        function togglePause() {
            if (!mediaRecorder) return;

            if (isPaused) {
                mediaRecorder.resume();
                timerInterval = setInterval(() => {
                    currentTime++;
                    updateTimer();
                }, 1000);
                pauseIcon.classList.remove('hidden');
                playIcon.classList.add('hidden');
                pauseBtnText.textContent = 'إيقاف مؤقت';
                pausedStatus.classList.add('hidden');
            } else {
                mediaRecorder.pause();
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                pauseIcon.classList.add('hidden');
                playIcon.classList.remove('hidden');
                pauseBtnText.textContent = 'استئناف';
                pausedStatus.classList.remove('hidden');
            }

            isPaused = !isPaused;
        }

        // Update Timer
        function updateTimer() {
            const mins = Math.floor(currentTime / 60);
            const secs = currentTime % 60;
            timerDisplay.textContent = 
                mins.toString().padStart(2, '0') + ':' + 
                secs.toString().padStart(2, '0');
        }

        // Format Time
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
        }

        // Update Recordings List
        function updateRecordingsList() {
            if (recordings.length === 0) {
                recordingsSection.classList.add('hidden');
                return;
            }

            recordingsSection.classList.remove('hidden');
            recordingsCount.textContent = recordings.length;

            recordingsList.innerHTML = recordings.map((rec, index) => `
                <div class="recording-item">
                    <div class="recording-header">
                        <div class="recording-info">
                            <div class="recording-title">تسجيل #${recordings.length - index}</div>
                            <div class="recording-timestamp">${rec.timestamp}</div>
                            <div class="recording-duration">المدة: ${formatTime(rec.duration)} • ${rec.format.toUpperCase()} • ${rec.size}</div>
                        </div>
                        <div class="recording-actions">
                            <button class="icon-btn download-btn" onclick="downloadRecording(${rec.id})" title="تحميل">
                                <svg class="icon" viewBox="0 0 24 24">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                            </button>
                            <button class="icon-btn delete-btn" onclick="deleteRecording(${rec.id})" title="حذف">
                                <svg class="icon" viewBox="0 0 24 24">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    <line x1="10" y1="11" x2="10" y2="17"/>
                                    <line x1="14" y1="11" x2="14" y2="17"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <audio controls src="${rec.url}"></audio>
                </div>
            `).reverse().join('');
        }

        // Download Recording
        function downloadRecording(id) {
            const recording = recordings.find(r => r.id === id);
            if (!recording) return;

            const a = document.createElement('a');
            a.href = recording.url;
            a.download = `تسجيل-${id}.${recording.format}`;
            a.click();
        }

        // Delete Recording
        function deleteRecording(id) {
            if (confirm('هل تريد حذف هذا التسجيل؟')) {
                recordings = recordings.filter(r => r.id !== id);
                updateRecordingsList();
            }
        }

        // Set Quality
        function setQuality(quality) {
            if (isRecording) {
                alert('لا يمكن تغيير الجودة أثناء التسجيل');
                return;
            }
            
            recordingQuality = quality;
            
            // تحديث الأزرار
            document.getElementById('studioQuality').classList.remove('active');
            document.getElementById('highQuality').classList.remove('active');
            
            if (quality === 'studio') {
                document.getElementById('studioQuality').classList.add('active');
            } else {
                document.getElementById('highQuality').classList.add('active');
            }
        }

        // Event Listeners
        startBtn.addEventListener('click', startRecording);
        pauseBtn.addEventListener('click', togglePause);
        stopBtn.addEventListener('click', stopRecording);
    </script>
</body>
</html>
